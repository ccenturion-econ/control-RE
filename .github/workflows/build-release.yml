name: Build release apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build app
        run: |
          python -m PyInstaller -y --windowed --name GeneradorHorasExtra --add-data "logo_conacom_2023_.png:." src/generador_horas_extra_app.py
          ditto -c -k --sequesterRsrc --keepParent dist/GeneradorHorasExtra.app GeneradorHorasExtra-mac-arm64.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeneradorHorasExtra-mac-arm64
          path: GeneradorHorasExtra-mac-arm64.zip

      - name: Attach macOS app to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GeneradorHorasExtra-mac-arm64.zip

  build-windows:
    name: Build Windows app
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build app
        run: |
          python -m PyInstaller -y --windowed --name GeneradorHorasExtra --add-data "logo_conacom_2023_.png;." src\generador_horas_extra_app.py
          Compress-Archive -Path dist\GeneradorHorasExtra -DestinationPath GeneradorHorasExtra-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeneradorHorasExtra-windows
          path: GeneradorHorasExtra-windows.zip

      - name: Attach Windows app to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GeneradorHorasExtra-windows.zip
